<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="ui-serif, 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif">
  <defs>
    <marker id="arrow1" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5C5249"/>
    </marker>
    <style>
      .label { font-size: 13px; fill: #1A1714; }
      .small { font-size: 11px; fill: #5C5249; }
      .mono { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; font-size: 11px; fill: #1A1714; }
      .mono-muted { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; font-size: 11px; fill: #5C5249; }
      .title { font-size: 14px; fill: #1A1714; font-weight: 600; }
      .caption { font-size: 12px; fill: #5C5249; font-style: italic; }
      .box { fill: #FAF6F0; stroke: #1A1714; stroke-width: 1.4; }
      .box-accent { fill: #FDF4EE; stroke: #A85C3D; stroke-width: 1.4; }
      .divider { stroke: #D4C9BC; stroke-width: 1; }
      .arrow { stroke: #5C5249; stroke-width: 1.4; fill: none; }
    </style>
  </defs>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" class="title">Figure 1 — Git-Native Architecture</text>
  <text x="450" y="52" text-anchor="middle" class="caption">The repository is the entire system. Each collaborator clones it locally.</text>

  <!-- Central Repository -->
  <rect x="310" y="200" width="280" height="258" rx="6" class="box"/>
  <rect x="310" y="200" width="280" height="32" rx="6" fill="#1A1714"/>
  <rect x="310" y="222" width="280" height="10" fill="#1A1714"/>
  <text x="450" y="221" text-anchor="middle" font-size="13" fill="#FAF6F0" font-weight="600">project repository (git)</text>
  
  <text x="328" y="252" class="mono">project-name/</text>
  <text x="340" y="270" class="mono-muted">├── PROJECT.md</text>
  <text x="340" y="286" class="mono-muted">├── state/</text>
  <text x="352" y="302" class="mono">│   ├── decisions.yaml</text>
  <text x="352" y="318" class="mono">│   ├── open_questions.yaml</text>
  <text x="352" y="334" class="mono">│   ├── action_items.yaml</text>
  <text x="352" y="350" class="mono">│   └── collaborators.yaml</text>
  <text x="340" y="366" class="mono-muted">├── knowledge/</text>
  <text x="352" y="382" class="mono">│   ├── meetings/</text>
  <text x="352" y="398" class="mono">│   ├── findings/</text>
  <text x="352" y="414" class="mono">│   ├── literature/</text>
  <text x="352" y="430" class="mono">│   └── provenance/</text>
  <text x="340" y="448" class="mono-muted">├── skills/</text>

  <!-- Collaborator: Kyle -->
  <rect x="50" y="100" width="200" height="100" rx="6" class="box"/>
  <text x="150" y="125" text-anchor="middle" class="label" font-weight="600">Kyle (PI)</text>
  <line x1="70" y1="138" x2="230" y2="138" class="divider"/>
  <text x="70" y="156" class="mono">local repo clone</text>
  <text x="70" y="174" class="mono">Claude Code session</text>
  <text x="70" y="192" class="mono-muted">↳ reads files directly</text>

  <!-- Collaborator: Maria -->
  <rect x="650" y="100" width="200" height="100" rx="6" class="box"/>
  <text x="750" y="125" text-anchor="middle" class="label" font-weight="600">Maria (postdoc)</text>
  <line x1="670" y1="138" x2="830" y2="138" class="divider"/>
  <text x="670" y="156" class="mono">local repo clone</text>
  <text x="670" y="174" class="mono">Claude Code session</text>
  <text x="670" y="192" class="mono-muted">↳ on branch maria/lit</text>

  <!-- Collaborator: Pedro -->
  <rect x="350" y="490" width="200" height="80" rx="6" class="box"/>
  <text x="450" y="515" text-anchor="middle" class="label" font-weight="600">Pedro (PhD student)</text>
  <line x1="370" y1="528" x2="530" y2="528" class="divider"/>
  <text x="370" y="546" class="mono">local repo clone</text>
  <text x="370" y="564" class="mono">Claude Code session</text>

  <!-- Arrows -->
  <path d="M 250 165 C 290 175 305 195 320 215" class="arrow" marker-end="url(#arrow1)" marker-start="url(#arrow1)"/>
  <path d="M 650 165 C 615 175 595 195 580 215" class="arrow" marker-end="url(#arrow1)" marker-start="url(#arrow1)"/>
  <path d="M 450 490 L 450 466" class="arrow" marker-end="url(#arrow1)" marker-start="url(#arrow1)"/>

  <!-- Arrow labels -->
  <text x="222" y="200" class="small" font-style="italic">git pull / push</text>
  <text x="610" y="200" text-anchor="end" class="small" font-style="italic">git pull / push</text>
  <text x="475" y="475" class="small" font-style="italic">git pull / push</text>
</svg>
