<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="ui-serif, 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5C5249"/>
    </marker>
    <marker id="arrow2-accent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#A85C3D"/>
    </marker>
    <style>
      .label { font-size: 13px; fill: #1A1714; }
      .small { font-size: 11px; fill: #5C5249; }
      .mono { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; font-size: 11px; fill: #1A1714; }
      .mono-muted { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; font-size: 11px; fill: #5C5249; }
      .title { font-size: 14px; fill: #1A1714; font-weight: 600; }
      .caption { font-size: 12px; fill: #5C5249; font-style: italic; }
      .box { fill: #FAF6F0; stroke: #1A1714; stroke-width: 1.4; }
      .box-accent { fill: #FDF4EE; stroke: #A85C3D; stroke-width: 1.4; }
      .divider { stroke: #D4C9BC; stroke-width: 1; }
      .arrow { stroke: #5C5249; stroke-width: 1.4; fill: none; }
      .arrow-accent { stroke: #A85C3D; stroke-width: 1.4; fill: none; }
    </style>
  </defs>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" class="title">Figure 2 — With MCP Server (Optional Augmentation)</text>
  <text x="450" y="52" text-anchor="middle" class="caption">The repo remains source of truth. The MCP server is a read-derived query layer.</text>

  <!-- Central Repository -->
  <rect x="320" y="230" width="260" height="170" rx="6" class="box"/>
  <rect x="320" y="230" width="260" height="32" rx="6" fill="#1A1714"/>
  <rect x="320" y="252" width="260" height="10" fill="#1A1714"/>
  <text x="450" y="251" text-anchor="middle" font-size="13" fill="#FAF6F0" font-weight="600">project repository (git)</text>
  
  <text x="338" y="282" class="mono-muted">state/</text>
  <text x="450" y="282" class="mono-muted">knowledge/</text>
  <text x="338" y="302" class="mono">decisions.yaml</text>
  <text x="450" y="302" class="mono">meetings/</text>
  <text x="338" y="320" class="mono">open_questions...</text>
  <text x="450" y="320" class="mono">findings/</text>
  <text x="338" y="338" class="mono">action_items...</text>
  <text x="450" y="338" class="mono">literature/</text>
  <text x="450" y="356" class="mono">provenance/</text>
  <text x="338" y="360" class="mono-muted">skills/</text>
  <text x="338" y="378" class="mono">SKILL.md files</text>

  <!-- MCP Server -->
  <rect x="320" y="440" width="260" height="140" rx="6" class="box-accent"/>
  <rect x="320" y="440" width="260" height="32" rx="6" fill="#A85C3D"/>
  <rect x="320" y="462" width="260" height="10" fill="#A85C3D"/>
  <text x="450" y="461" text-anchor="middle" font-size="13" fill="#FAF6F0" font-weight="600">MCP Server (derived)</text>
  
  <text x="338" y="492" class="mono">semantic tool surface:</text>
  <text x="338" y="510" class="mono-muted">  search_discussions()</text>
  <text x="338" y="526" class="mono-muted">  get_decisions_about()</text>
  <text x="338" y="542" class="mono-muted">  find_related_prior()</text>
  <text x="338" y="558" class="mono-muted">  + vector index over repo</text>
  <text x="338" y="574" class="mono-muted">  + rebuilt on commits</text>

  <!-- Arrow: MCP reads from repo -->
  <path d="M 450 440 L 450 400" class="arrow-accent" marker-end="url(#arrow2-accent)"/>
  <text x="460" y="425" class="small" fill="#A85C3D" font-style="italic">reads from</text>

  <!-- Collaborator: Direct repo access -->
  <rect x="40" y="140" width="220" height="120" rx="6" class="box"/>
  <text x="150" y="165" text-anchor="middle" class="label" font-weight="600">Kyle (PI)</text>
  <line x1="60" y1="178" x2="240" y2="178" class="divider"/>
  <text x="60" y="196" class="mono">local repo clone</text>
  <text x="60" y="214" class="mono">Claude Code</text>
  <text x="60" y="234" class="small" font-style="italic">direct file access for</text>
  <text x="60" y="250" class="small" font-style="italic">reads and writes</text>

  <!-- Collaborator: Via MCP -->
  <rect x="640" y="140" width="220" height="120" rx="6" class="box"/>
  <text x="750" y="165" text-anchor="middle" class="label" font-weight="600">Maria (postdoc)</text>
  <line x1="660" y1="178" x2="840" y2="178" class="divider"/>
  <text x="660" y="196" class="mono">local repo clone</text>
  <text x="660" y="214" class="mono">Claude Code</text>
  <text x="660" y="234" class="small" font-style="italic">+ MCP tools for</text>
  <text x="660" y="250" class="small" font-style="italic">semantic queries</text>

  <!-- Connections -->
  <path d="M 260 200 L 320 280" class="arrow" marker-end="url(#arrow2)" marker-start="url(#arrow2)"/>
  <text x="278" y="225" class="small" font-style="italic">git pull/push</text>

  <path d="M 640 200 L 580 280" class="arrow" marker-end="url(#arrow2)" marker-start="url(#arrow2)"/>
  <text x="585" y="225" class="small" font-style="italic">git pull/push</text>

  <path d="M 640 230 C 600 380 580 460 580 490" class="arrow-accent" marker-end="url(#arrow2-accent)" marker-start="url(#arrow2-accent)"/>
  <text x="600" y="395" class="small" fill="#A85C3D" font-style="italic">MCP tool calls</text>

  <!-- Note at bottom -->
  <line x1="60" y1="600" x2="840" y2="600" class="divider"/>
</svg>
