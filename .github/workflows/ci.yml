name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: tests + lint (editable install)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (editable)
        run: pip install -e ".[dev]"
      - name: Configure git identity for tests
        run: |
          git config --global user.name  "CI Tester"
          git config --global user.email "ci@example.com"
      - name: Lint
        run: ruff check src tests
      - name: Pytest
        run: pytest -q

  wheel-smoke:
    name: wheel build + clean-install smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs full history to derive the version
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel
      - name: Show wheel version
        run: ls dist/
      - name: Install wheel into a clean venv
        run: |
          python -m venv /tmp/wheel-venv
          /tmp/wheel-venv/bin/pip install dist/*.whl
      - name: Configure git identity
        run: |
          git config --global user.name  "CI Tester"
          git config --global user.email "ci@example.com"
      - name: Smoke-test `cairn init` from the installed wheel
        run: |
          set -e
          cd /tmp
          /tmp/wheel-venv/bin/cairn init wheel-smoke --no-input
          test -f /tmp/wheel-smoke/PROJECT.md
          test -d /tmp/wheel-smoke/state
          test -d /tmp/wheel-smoke/skills/orient
          test -f /tmp/wheel-smoke/.claude/settings.json
          /tmp/wheel-venv/bin/cairn --help
          (cd /tmp/wheel-smoke && /tmp/wheel-venv/bin/cairn validate)
